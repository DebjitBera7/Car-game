<!DOCTYPE html>
<html>
<head>
<title>Player Highway Game</title>

<style>
body{margin:0;overflow:hidden;background:black;color:white;font-family:Arial}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:22px;
}

#mobile{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

#mobile button{
padding:20px;
font-size:25px;
margin:10px;
background:yellow;
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">5</span>
</div>

<canvas id="gameCanvas"></canvas>

<div id="mobile">
<button id="left">◀</button>
<button id="right">▶</button>
</div>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let score=0;
let lives=5;

const road=new Image();
road.src="images/road.png";

const player=new Image();
player.src="images/player.png";

const carImg=new Image();
carImg.src="images/car.png";

const truckImg=new Image();
truckImg.src="images/truck.png";

const car={
x:canvas.width/2,
y:canvas.height-150,
width:60,
height:100,
speed:8
};

let obstacles=[];

function spawnObstacle(){

let img=Math.random()>0.5?carImg:truckImg;

obstacles.push({
x:Math.random()*(canvas.width-80),
y:-120,
width:80,
height:120,
img:img
});

}

setInterval(spawnObstacle,900);

const keys={};

window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

function control(){

if(keys["ArrowLeft"]) car.x-=car.speed;

if(keys["ArrowRight"]) car.x+=car.speed;

}

document.getElementById("left").onclick=()=>{
car.x-=60;
};

document.getElementById("right").onclick=()=>{
car.x+=60;
};

function update(){

obstacles.forEach((obs,i)=>{

obs.y+=7;

if(obs.y>canvas.height){

obstacles.splice(i,1);

score+=10;

document.getElementById("score").innerText=score;

}

});

}

function collision(){

obstacles.forEach((obs,i)=>{

if(
car.x<obs.x+obs.width &&
car.x+car.width>obs.x &&
car.y<obs.y+obs.height &&
car.y+car.height>obs.y
){

lives--;

document.getElementById("lives").innerText=lives;

obstacles.splice(i,1);

}

});

}

function draw(){

ctx.drawImage(road,0,0,canvas.width,canvas.height);

ctx.drawImage(player,car.x,car.y,car.width,car.height);

obstacles.forEach(obs=>{
ctx.drawImage(obs.img,obs.x,obs.y,obs.width,obs.height);
});

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

control();

update();

collision();

draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
