<!DOCTYPE html>
<html>
<head>
<title>AI Game</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#ui{position:absolute;top:20px;left:20px;color:white;font-size:20px;}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">3</span>
</div>

<canvas id="c"></canvas>

<script>

const canvas=c;
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const roadLeft = canvas.width*0.2;
const roadRight = canvas.width*0.8;

let score=0;
let lives=3;

const road=new Image();
road.src="images/road.png";

const carImg=new Image();
carImg.src="images/car.png";

const trafficImg=new Image();
trafficImg.src="images/player.png";

const truckImg=new Image();
truckImg.src="images/truck.png";

const car={
x:(roadLeft+roadRight)/2,
y:canvas.height-150,
w:60,h:100,s:6
};

let obs=[];

setInterval(()=>{
let x=Math.random()*(roadRight-roadLeft-60)+roadLeft;
obs.push({x:x,y:-100,w:60,h:100,img:Math.random()>0.5?trafficImg:truckImg});
},1200);

/* 🤖 AI CONTROL */
function ai(){

let move=0;

obs.forEach(o=>{

let d=car.y-o.y;

if(d>0 && d<150){

if(car.x<o.x+o.w && car.x+car.w>o.x){

if(o.x<car.x) move=1;
else move=-1;

}

}

});

if(move===1) car.x+=car.s;
if(move===-1) car.x-=car.s;

/* boundary */
if(car.x<roadLeft) car.x=roadLeft;
if(car.x+car.w>roadRight) car.x=roadRight-car.w;

}

/* LOOP */
function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(road,0,0,canvas.width,canvas.height);

/* AI car (UP) */
ctx.save();
ctx.translate(car.x+30,car.y+50);
ctx.rotate(Math.PI);
ctx.drawImage(carImg,-30,-50,60,100);
ctx.restore();

/* traffic (DOWN) */
obs.forEach((o,i)=>{

o.y+=6;

ctx.drawImage(o.img,o.x,o.y,o.w,o.h);

if(o.y>canvas.height){
obs.splice(i,1);
score+=10;
scoreEl.innerText=score;
}

/* collision */
if(car.x<o.x+o.w && car.x+car.w>o.x && car.y<o.y+o.h && car.y+car.h>o.y){
lives--;
livesEl.innerText=lives;
obs.splice(i,1);
}

});

ai();

requestAnimationFrame(loop);
}

const scoreEl=document.getElementById("score");
const livesEl=document.getElementById("lives");

loop();

</script>
</body>
</html>
