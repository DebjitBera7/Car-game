<!DOCTYPE html>
<html>
<head>
<title>AI Self Driving Car</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:24px;
}

canvas{
display:block;
}

</style>

</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">5</span>
</div>

<canvas id="gameCanvas"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let lives = 5;

/* IMAGES */

const roadImg = new Image();
roadImg.src = "images/road.png";

const playerImg = new Image();
playerImg.src = "images/player.png";

const carImg = new Image();
carImg.src = "images/car.png";

const truckImg = new Image();
truckImg.src = "images/truck.png";


const player = {
x: canvas.width/2-40,
y: canvas.height-150,
width:80,
height:120,
speed:6
};

let traffic=[];

function spawnTraffic(){

let type=Math.random();

traffic.push({

x:Math.random()*(canvas.width-80),
y:-150,
width:80,
height:120,
img:type<0.7?carImg:truckImg

});

}

setInterval(spawnTraffic,1200);


/* AI DRIVING */

function aiDrive(){

traffic.forEach(t=>{

if(
t.y > player.y-200 &&
t.y < player.y+120
){

if(t.x < player.x){

player.x += player.speed;

}

else{

player.x -= player.speed;

}

}

});

}

/* UPDATE TRAFFIC */

function updateTraffic(){

traffic.forEach((t,i)=>{

t.y+=8;

if(t.y>canvas.height){

traffic.splice(i,1);
score+=10;

document.getElementById("score").innerText=score;

}

});

}

/* DRAW */

function drawRoad(){

ctx.drawImage(roadImg,0,0,canvas.width,canvas.height);

}

function drawPlayer(){

ctx.drawImage(playerImg,player.x,player.y,player.width,player.height);

}

function drawTraffic(){

traffic.forEach(t=>{

ctx.drawImage(t.img,t.x,t.y,t.width,t.height);

});

}

/* COLLISION */

function collision(){

traffic.forEach((t,i)=>{

if(
player.x < t.x+t.width &&
player.x+player.width > t.x &&
player.y < t.y+t.height &&
player.y+player.height > t.y
){

lives--;
document.getElementById("lives").innerText=lives;

traffic.splice(i,1);

if(lives<=0){

alert("AI FAILED\nScore: "+score);
location.reload();

}

}

});

}

/* GAME LOOP */

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawRoad();

aiDrive();

drawPlayer();

drawTraffic();

updateTraffic();

collision();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
