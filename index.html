<!DOCTYPE html>
<html>
<head>
<title>AI Highway Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
color:white;
}

/* BACKGROUND */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#00f7ff33,transparent);
animation:moveBg 8s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(-50%,-50%)}
}

.container{
position:relative;
text-align:center;
z-index:2;
width:90%;
max-width:450px;
}

h1{
font-size:40px;
margin-bottom:40px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
}

/* CARD */
.card{
padding:40px;
border-radius:20px;
background:rgba(0,0,0,0.75);
border:2px solid #00f7ff;
box-shadow:0 0 30px #00f7ff;
}

/* BUTTON */
button{
display:block;
width:100%;
margin:15px 0;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

/* AI BUTTON */
.ai-btn{
background:#00f7ff;
color:black;
box-shadow:0 0 20px #00f7ff;
}

/* NORMAL BUTTON */
.play-btn{
background:white;
color:black;
}

/* BADGE */
.badge{
display:inline-block;
padding:6px 15px;
margin-bottom:15px;
border-radius:12px;
font-size:14px;
font-weight:bold;
background:#00f7ff;
color:black;
}

</style>

</head>

<body>

<div class="container">

<h1>🚗 AI Highway Game</h1>

<div class="card">

<div class="badge">🤖 AI MODE</div>

<button class="ai-btn" onclick="location.href='game2.html'">
👁 Watch Tutorial
</button>

<button class="play-btn" onclick="location.href='game.html'">
🎮 Play Game
</button>

</div>

</div>

</body>
</html>
