<!DOCTYPE html>
<html>
<head>
<title>AI Highway Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
color:white;
overflow:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#00f7ff33,transparent);
animation:moveBg 8s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(-50%,-50%)}
}

.container{
position:relative;
z-index:2;
text-align:center;
width:90%;
max-width:450px;
}

/* TITLE */
h1{
font-size:38px;
margin-bottom:35px;
color:#00f7ff;
text-shadow:0 0 15px #00f7ff;
}

/* CARD */
.card{
padding:30px;
margin:20px 0;
border-radius:20px;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
border:2px solid #00f7ff;
box-shadow:0 0 30px #00f7ff;
}

/* BADGE */
.badge{
display:inline-block;
padding:6px 14px;
margin-bottom:15px;
border-radius:12px;
background:#00f7ff;
color:black;
font-weight:bold;
}

/* BUTTON */
button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* AI BUTTON */
.ai-btn{
background:#00f7ff;
color:black;
box-shadow:0 0 15px #00f7ff;
}

/* PLAY BUTTON */
.play-btn{
background:white;
color:black;
}

/* HOVER */
button:hover{
transform:scale(1.05);
}

/* TEXT */
.label{
margin-top:10px;
font-size:16px;
color:#ddd;
}

</style>
</head>

<body>

<div class="container">

<h1>🚗 AI Highway Game</h1>

<!-- AI MODE -->
<div class="card">
<div class="badge">🤖 AI MODE</div>

<button class="ai-btn" onclick="location.href='game2.html'">
👁 Watch Tutorial
</button>

<div class="label">AI controls the car automatically</div>
</div>

<!-- PLAY GAME -->
<div class="card">
<button class="play-btn" onclick="location.href='game.html'">
🎮 Play Game
</button>
</div>

</div>

</body>
</html>
