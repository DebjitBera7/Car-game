<!DOCTYPE html>
<html>
<head>
<title>AI Highway Game</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#000,#001f3f);
color:white;
}

/* GLOW */
body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:cyan;
filter:blur(150px);
opacity:0.2;
top:-100px;
left:-100px;
}

/* BOX */
.container{
text-align:center;
padding:60px;
border-radius:20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
box-shadow:0 0 30px cyan;
}

/* TITLE */
h1{
font-size:45px;
text-shadow:0 0 20px cyan;
}

/* BUTTON */
button{
padding:15px 40px;
margin:15px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:cyan;
color:black;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px cyan;
background:white;
}

p{
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<h1>🚗 AI Highway Game</h1>

<button onclick="location.href='game2.html'">
🤖 Watch Tutorial
</button>
<p>AI controls the car</p>

<br>

<button onclick="location.href='game.html'">
🎮 Play Game
</button>
<p>Control manually</p>

</div>

</body>
</html>
