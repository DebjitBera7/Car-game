<!DOCTYPE html>
<html>
<head>
<title>AI Highway Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
color:white;
}

/* MOVING LIGHT BACKGROUND */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#00f7ff33,transparent);
animation:moveBg 8s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(-50%,-50%)}
}

/* CONTAINER */
.container{
position:relative;
text-align:center;
z-index:2;
width:90%;
max-width:450px;
}

/* TITLE */
h1{
font-size:42px;
margin-bottom:40px;
color:#00f7ff;
text-shadow:0 0 25px #00f7ff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:0.7}
to{opacity:1}
}

/* CARD */
.card{
padding:35px;
margin:25px 0;
border-radius:20px;
transition:0.4s;
position:relative;
overflow:hidden;
}

/* GLOW BORDER */
.card::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background:linear-gradient(45deg,#00f7ff,#ff00ff,#00f7ff);
z-index:-1;
filter:blur(25px);
opacity:0.7;
}

/* AI CARD */
.ai{
background:rgba(0,0,0,0.75);
border:1px solid #00f7ff;
}

/* PLAYER CARD */
.player{
background:rgba(0,0,0,0.75);
border:1px solid #aaa;
}

/* FLOAT EFFECT */
.card:hover{
transform:translateY(-10px) scale(1.05);
}

/* BUTTON */
button{
padding:16px 35px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

/* AI BUTTON */
.ai button{
background:#00f7ff;
color:black;
box-shadow:0 0 20px #00f7ff;
}

.ai button:hover{
box-shadow:0 0 40px #00f7ff;
}

/* PLAYER BUTTON */
.player button{
background:white;
color:black;
}

.player button:hover{
transform:scale(1.1);
}

/* TEXT */
.label{
margin-top:12px;
font-size:16px;
color:#ccc;
}

/* BADGE */
.badge{
display:inline-block;
padding:6px 15px;
margin-bottom:10px;
border-radius:12px;
font-size:14px;
font-weight:bold;
}

/* BADGES */
.ai-badge{
background:#00f7ff;
color:black;
}

.player-badge{
background:#888;
color:black;
}

</style>
</head>

<body>

<div class="container">

<h1>🚗 AI Highway Game</h1>

<!-- AI MODE -->
<div class="card ai">
<div class="badge ai-badge">🤖 AI MODE</div><br>
<button onclick="location.href='game2.html'">👁 Watch Tutorial</button>
<div class="label">AI controls the car automatically</div>
</div>

<!-- PLAYER MODE -->
<div class="card player">
<div class="badge player-badge">🎮
