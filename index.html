<!DOCTYPE html>
<html>
<head>
<title>AI Highway Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#020617,#000);
overflow:hidden;
color:white;
}

/* ANIMATED BACKGROUND GRID */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
linear-gradient(#00f7ff22 1px,transparent 1px),
linear-gradient(90deg,#00f7ff22 1px,transparent 1px);
background-size:60px 60px;
animation:moveGrid 10s linear infinite;
}

@keyframes moveGrid{
0%{transform:translate(0,0)}
100%{transform:translate(-60px,-60px)}
}

/* CONTAINER */
.container{
text-align:center;
z-index:2;
}

/* TITLE */
h1{
font-size:50px;
margin-bottom:60px;
background:linear-gradient(90deg,#00f7ff,#00ffcc);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 30px #00f7ff;
}

/* GLASS CARD */
.card{
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 50px #00f7ff33;
}

/* BUTTON */
button{
display:block;
width:280px;
margin:20px auto;
padding:16px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

/* AI BUTTON */
.ai-btn{
background:linear-gradient(90deg,#00f7ff,#00ffcc);
color:black;
box-shadow:0 0 25px #00f7ff;
}

/* PLAY BUTTON */
.play-btn{
background:white;
color:black;
}

/* HOVER EFFECT */
button:hover{
transform:scale(1.1);
box-shadow:0 0 40px #00f7ff;
}

/* GLOW DOTS */
.glow{
position:absolute;
width:200px;
height:200px;
background:#00f7ff33;
filter:blur(100px);
border-radius:50%;
animation:float 6s infinite alternate;
}

.glow:nth-child(1){top:10%;left:10%;}
.glow:nth-child(2){bottom:10%;right:10%;}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-50px)}
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container">

<h1>🚗 AI Highway Game</h1>

<div class="card">

<button class="ai-btn" onclick="location.href='game2.html'">
🤖 AI Demo
</button>

<button class="play-btn" onclick="location.href='game.html'">
🎮 Play Game
</button>

</div>

</div>

</body>
</html>
