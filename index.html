<!DOCTYPE html>
<html>
<head>
<title>AI Highway Game</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(180deg,#000,#020d1f);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

/* BOX */
.container{
text-align:center;
padding:50px;
border-radius:20px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px cyan;
}

/* TITLE */
h1{
font-size:40px;
margin-bottom:30px;
text-shadow:0 0 15px cyan;
}

/* BUTTON */
button{
padding:15px 40px;
margin:15px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:cyan;
color:black;
transition:0.3s;
}

button:hover{
background:white;
transform:scale(1.1);
box-shadow:0 0 20px cyan;
}

/* TEXT */
p{
margin-top:5px;
font-size:14px;
color:#ccc;
}

</style>

</head>

<body>

<div class="container">

<h1>🚗 AI Highway Game</h1>

<!-- AI -->
<button onclick="location.href='game2.html'">
🤖 Watch Tutorial
</button>
<p>See how AI avoids traffic</p>

<br>

<!-- PLAYER -->
<button onclick="location.href='game.html'">
🎮 Play Game
</button>
<p>Control the car yourself</p>

</div>

</body>
</html>
