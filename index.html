<!DOCTYPE html>
<html>
<head>
<title>AI Car Game</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#000,#0a0a2a);
color:white;
font-family:Arial;
text-align:center;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

h1{
font-size:42px;
margin-bottom:50px;
color:#00f7ff;
text-shadow:0 0 15px #00f7ff;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
margin:20px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,255,0.3);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 40px #00f7ff;
}

button{
padding:18px 35px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
background:#00f7ff;
color:black;
font-weight:bold;
}

.sub{
margin-top:12px;
font-size:18px;
color:#aaa;
}

</style>

</head>

<body>

<div class="container">

<h1>🚗 AI Highway Game</h1>

<!-- AI Mode -->
<div class="card">
<button onclick="location.href='game2.html'">👁 Watch Tutorial</button>
<div class="sub">AI Based</div>
</div>

<!-- Player Mode -->
<div class="card">
<button onclick="location.href='game.html'">🎮 Play Game</button>
</div>

</div>

</body>
</html>
