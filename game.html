<!DOCTYPE html>
<html>
<head>
<title>Highway Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:22px;
}
</style>

</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">3</span>
</div>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* ROAD AREA */
const roadLeft = canvas.width * 0.2;
const roadRight = canvas.width * 0.8;

let score = 0;
let lives = 3;

/* IMAGES */
const road = new Image();
road.src = "images/road.png";

const carImg = new Image();
carImg.src = "images/car.png";

const trafficImg = new Image();
trafficImg.src = "images/player.png";

const truckImg = new Image();
truckImg.src = "images/truck.png";

/* PLAYER */
const car = {
x: (roadLeft + roadRight) / 2,
y: canvas.height - 150,
w: 60,
h: 100,
speed: 7
};

let obs = [];

/* SPAWN */
setInterval(()=>{
let x = Math.random()*(roadRight-roadLeft-60)+roadLeft;

obs.push({
x:x,
y:-100,
w:60,
h:100,
img: Math.random()>0.5 ? trafficImg : truckImg
});
},1000);

/* CONTROL */
onkeydown = e=>{
if(e.key=="ArrowLeft") car.x -= car.speed;
if(e.key=="ArrowRight") car.x += car.speed;
};

/* 🔥 ROTATE FUNCTION */
function drawRotated(img,x,y,w,h,angle){
let rad = angle * Math.PI/180;

ctx.save();
ctx.translate(x+w/2,y+h/2);
ctx.rotate(rad);
ctx.drawImage(img,-w/2,-h/2,w,h);
ctx.restore();
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* ROAD */
ctx.drawImage(road,0,0,canvas.width,canvas.height);

/* 🚗 PLAYER (UP) */
drawRotated(carImg,car.x,car.y,car.w,car.h,0);

/* 🚙 TRAFFIC (DOWN) */
obs.forEach((o,i)=>{

o.y += 6;

drawRotated(o.img,o.x,o.y,o.w,o.h,180);

/* REMOVE */
if(o.y > canvas.height){
obs.splice(i,1);
score += 10;
document.getElementById("score").innerText = score;
}

/* COLLISION */
if(
car.x < o.x + o.w &&
car.x + car.w > o.x &&
car.y < o.y + o.h &&
car.y + car.h > o.y
){
lives--;
document.getElementById("lives").innerText = lives;
obs.splice(i,1);
}

});

/* ROAD LIMIT */
if(car.x < roadLeft) car.x = roadLeft;
if(car.x + car.w > roadRight) car.x = roadRight - car.w;

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
