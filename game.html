<!DOCTYPE html>
<html>
<head>
<title>Player Car Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:22px;
}
</style>

</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">5</span>
</div>

<canvas id="gameCanvas"></canvas>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let score=0;
let lives=5;

const road=new Image();
road.src="images/road.png";

const carImg=new Image();
carImg.src="images/car.png";

const trafficImg=new Image();
trafficImg.src="images/player.png";

const truckImg=new Image();
truckImg.src="images/truck.png";

const car={
x:canvas.width/2,
y:canvas.height-150,
width:50,
height:90,
speed:7
};

let obstacles=[];

function spawnObstacle(){

let type=Math.random();

obstacles.push({
x:Math.random()*(canvas.width-80),
y:-100,
width:60,
height:100,
img: type>0.5 ? trafficImg : truckImg
});

}

setInterval(spawnObstacle,1200);

const keys={};

window.addEventListener("keydown",e=>{
keys[e.key]=true;
});

window.addEventListener("keyup",e=>{
keys[e.key]=false;
});

function control(){

if(keys["ArrowLeft"]) car.x-=car.speed;
if(keys["ArrowRight"]) car.x+=car.speed;

if(car.x<0) car.x=0;
if(car.x+car.width>canvas.width)
car.x=canvas.width-car.width;

}

function updateObstacles(){

obstacles.forEach((obs,index)=>{

obs.y+=6;

if(obs.y>canvas.height){

score+=10;
document.getElementById("score").innerText=score;

obstacles.splice(index,1);

}

});

}

function collision(){

obstacles.forEach((obs,index)=>{

if(
car.x < obs.x + obs.width &&
car.x + car.width > obs.x &&
car.y < obs.y + obs.height &&
car.y + car.height > obs.y
){

lives--;

document.getElementById("lives").innerText=lives;

obstacles.splice(index,1);

}

});

}

function draw(){

ctx.drawImage(road,0,0,canvas.width,canvas.height);

ctx.drawImage(carImg,car.x,car.y,car.width,car.height);

obstacles.forEach(obs=>{
ctx.drawImage(obs.img,obs.x,obs.y,obs.width,obs.height);
});

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

control();

updateObstacles();

collision();

draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
