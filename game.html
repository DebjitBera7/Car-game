<!DOCTYPE html>
<html>
<head>
<title>Car Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
font-size:20px;
}

#gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
text-align:center;
}
</style>

</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">5</span><br>
Speed: <span id="speed">5</span>
</div>

<canvas id="canvas"></canvas>

<div id="gameOver">
<h1>GAME OVER</h1>
<p>Score: <span id="final"></span></p>
<button onclick="location.reload()">Restart</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const roadLeft = canvas.width * 0.3;
const roadRight = canvas.width * 0.7;

let score = 0;
let lives = 5;
let gameActive = true;
let speed = 5;

// IMAGES
const road = new Image(); road.src = "images/road.png";
const playerImg = new Image(); playerImg.src = "images/player.png";
const carImg = new Image(); carImg.src = "images/car.png";
const truckImg = new Image(); truckImg.src = "images/truck.png";
const coinImg = new Image(); coinImg.src = "images/coin.png";

// PLAYER
const car = {
x: canvas.width/2,
y: canvas.height - 150,
w:60,
h:100,
speed:6
};

let obstacles = [];
let coins = [];

// KEYBOARD
const keys = {};
window.addEventListener("keydown", e=> keys[e.key]=true);
window.addEventListener("keyup", e=> keys[e.key]=false);

// MOBILE
let touchX = 0, touchY = 0;

canvas.addEventListener("touchstart", e=>{
touchX = e.touches[0].clientX;
touchY = e.touches[0].clientY;
});

canvas.addEventListener("touchmove", e=>{
let x = e.touches[0].clientX;
let y = e.touches[0].clientY;

if(x > touchX) car.x += car.speed;
else car.x -= car.speed;

if(y < touchY) car.y -= car.speed;
else car.y += car.speed;

touchX = x;
touchY = y;
});

// CONTROL
function control(){
if(keys["ArrowLeft"]) car.x -= car.speed;
if(keys["ArrowRight"]) car.x += car.speed;
if(keys["ArrowUp"]) car.y -= car.speed;
if(keys["ArrowDown"]) car.y += car.speed;

// boundary
if(car.x < roadLeft) car.x = roadLeft;
if(car.x + car.w > roadRight) car.x = roadRight - car.w;
if(car.y < 0) car.y = 0;
if(car.y + car.h > canvas.height) car.y = canvas.height - car.h;
}

// TRAFFIC
setInterval(()=>{
obstacles.push({
x: roadLeft + Math.random()*(roadRight-roadLeft-60),
y:-100,
w:60,
h:100,
img: Math.random()>0.5 ? carImg : truckImg
});
},700);

// COIN
setInterval(()=>{
coins.push({
x: roadLeft + Math.random()*(roadRight-roadLeft-30),
y:-50
});
},1200);

// SPEED INCREASE
setInterval(()=>{
speed += 0.3; // smooth increase
speedEl.innerText = speed.toFixed(1);
},1000);

// UPDATE
function update(){

// traffic
obstacles.forEach((o,i)=>{
o.y += speed;

if(o.y > canvas.height){
obstacles.splice(i,1);
score += 10;
scoreEl.innerText = score;
}

if(
car.x < o.x+o.w &&
car.x+car.w > o.x &&
car.y < o.y+o.h &&
car.y+car.h > o.y
){
lives--;
livesEl.innerText = lives;
obstacles.splice(i,1);

if(lives <= 0){
gameActive = false;
final.innerText = score;
gameOver.style.display="block";
}
}
});

// coins
coins.forEach((c,i)=>{
c.y += speed;

if(
car.x < c.x+30 &&
car.x+car.w > c.x &&
car.y < c.y+30 &&
car.y+car.h > c.y
){
score += 20;
scoreEl.innerText = score;
coins.splice(i,1);
}
});
}

// DRAW
function draw(){
ctx.drawImage(road,0,0,canvas.width,canvas.height);
ctx.drawImage(playerImg,car.x,car.y,car.w,car.h);

obstacles.forEach(o=>{
ctx.drawImage(o.img,o.x,o.y,o.w,o.h);
});

coins.forEach(c=>{
ctx.drawImage(coinImg,c.x,c.y,30,30);
});
}

// LOOP
function loop(){
if(!gameActive) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

control();
update();
draw();

requestAnimationFrame(loop);
}

// UI
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const speedEl = document.getElementById("speed");
const final = document.getElementById("final");
const gameOver = document.getElementById("gameOver");

loop();

</script>

</body>
</html>
